# =============================================================================
# Shadowverse EVOLVE 아키타입 정의 파일 — 작성 가이드 겸 마스터 템플릿
# 스키마 상세: docs/ARCHETYPES_SCHEMA.md
# =============================================================================
#
# 작성 원칙:
#   1. 카드 원문 텍스트는 적지 않는다 → cards.json에서 자동 조회됨
#   2. "왜 이 카드가 이 덱의 핵심인가"를 1~2문장으로 쓴다
#   3. 통계 근거가 없으면 confidence: low, note에 "플레이 경험 기반" 명시
#   4. 전 카드 태깅 불필요 — 아키타입 내 핵심 5~10장만
#   5. 확신이 낮은 내용은 적지 않기보다 confidence 낮춰서 적는 게 낫다
#
# local_roles 사용 가능 값:
#   interaction         — 상대 카드에 반응하는 제거/방해
#   removal             — 상대 필드 제거
#   tempo_disruptor     — 상대 템포를 깨는 카드
#   engine              — 지속적으로 자원을 만드는 카드
#   payoff              — 조건 달성 시 폭발적 효과
#   finisher            — 게임을 끝내는 카드
#   stabilizer          — 위기 상황을 버티게 해주는 카드
#   extender            — 같은 턴 추가 플레이를 가능하게 함
#   tutor               — 필요한 카드를 서치
#   graveyard_enabler   — 묘지 카드 수를 채워주는 카드
#   graveyard_payoff_support — 묘지 참조 효과를 강화
#   evo_target          — 진화 대상으로 쓰이는 카드
#   defensive_trick     — 퀵 등 기습적 방어 수단
#   reach               — 리더 직접 데미지

