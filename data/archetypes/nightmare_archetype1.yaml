# ナイトメア — archetype1 (46건)
# 클러스터 대표 카드 (작성 힌트용):
#   ストレイホロウ・イルガンノ
#   奔放なる獄炎・ケルベロス
#   異形
#   人外魔境・クリストフ
#   友魂の少女・ルナ

id: nightmare_archetype1
display_name: 묘지 나이트메어
class: ナイトメア
status: active

one_liner: >
  主に墓場が20枚以上達成で発動する ブラックスワン・オディール の【疾走】を絡めた
  大打点を狙うミッドレンジデッキ。

gameplan:
  early: >
    墓場を貯めることができる ストレイホロウ・イルガンノ や
    死期を視るもの・グレモリー をプレイして墓場を積み上げる。
  mid: >
    墓場が10枚以上貯まる中盤に 奔放なる獄炎・ケルベロス で相手リーダーの体力を削りながら
    盤面処理を行う。人外魔境・クリストフ から カオスルーラー・アイシィレンドリング や
    奔放なる獄炎・ケルベロス を墓場から場に出して一気に盤面を形成する。
  late: >
    人外魔境・クリストフ から ブラックスワン・オディール を場に出し、
    【NC_20】の能力で【疾走】を持った10ダメージに加えて、
    ストレイホロウ・イルガンノ の【NC_10】で墓場から出した 異形 と合わせて14ダメージ。
    ブラックスワン・オディール を2枚場に出して20点ダメージも可能。

win_conditions:
  - ブラックスワン・オディール【NC_20】疾走10点+異形で合計14点フィニッシュ
  - ブラックスワン・オディール×2枚展開による20点OTK

