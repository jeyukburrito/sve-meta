# エルフ — archetype1 (54건)
# 클러스터 대표 카드 (작성 힌트용):
#   小さな勇士・スクナ
#   マドロスエルフ
#   優美な猫姉妹・シャム＆シャマ
#   深緑の弓使い・アリサ
#   〔渚の花嫁〕新田美波

id: elf_archetype1
display_name: 콤보 엘프
class: エルフ
status: active

one_liner: >
  5ターン目に〔渚の花嫁〕新田美波を絡めた展開によって大ダメージと盤面展開を両方行う早期決着型のデッキ。

gameplan:
  early: >
    マドロスエルフ や ロイヤルクリスタリア・ティア で盤面を形成しつつ、
    爆砕の傭兵・フィーナ でフィニッシャーである 小さな勇士・スクナ と
    優美な猫姉妹・シャム＆シャマ を探して5ターン目の準備を整える。
  mid: >
    5ターン目に〔渚の花嫁〕新田美波 から アナスタシア をプレイし、
    戻ったPPから 小さな勇士・スクナ や 優美な猫姉妹・シャム＆シャマ をプレイして、
    【疾走】するカードを含めた盤面の強化を行う。
  late: >
    相手に盤面処理を押し付けて回復する余裕をなくし、
    最後に対戦相手が取りこぼしたフォロワーや手札の【疾走】フォロワーでトドメを狙う。

win_conditions:
  - 5ターン目の〔渚の花嫁〕新田美波→アナスタシアコンボによる盤面+大ダメージ
  - 疾走フォロワー(小さな勇士・スクナ、優美な猫姉妹・シャム＆シャマ)によるフィニッシュ

